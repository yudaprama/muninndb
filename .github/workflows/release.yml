name: Build and Release

on:
  push:
    branches: [main]
    # triggers on tag push as well if manual tag created

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            goos: darwin
            goarch: arm64

          - runner: macos-14
            goos: darwin
            goarch: amd64

          - runner: ubuntu-latest
            goos: linux
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Fetch model assets
        run: make fetch-model

      - name: Fetch ORT libraries
        run: make fetch-ort-libs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web assets
        run: cd web && npm ci --ignore-scripts && npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          go build -tags localassets -ldflags "-X main.version=${GITHUB_REF_NAME}" -o muninn-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/muninn/...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muninn-${{ matrix.goos }}-${{ matrix.goarch }}
          path: muninn-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{github.run_number}}
          name: Release v${{github.run_number}}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            muninn-darwin-arm64
            muninn-darwin-amd64
            muninn-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
