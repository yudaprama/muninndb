name: Build and Release

on:
  push:
    branches: [main]
    # triggers on tag push as well if manual tag created

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Fetch model assets
        run: make fetch-model

      - name: Fetch ORT libraries
        run: make fetch-ort-libs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web assets
        run: cd web && npm ci --ignore-scripts && npm run build

      - name: Build Linux binary
        run: |
          mkdir -p dist
          CGO_ENABLED=1 go build -tags localassets -ldflags "-X main.version=${GITHUB_REF_NAME}" -o dist/muninn-linux-amd64 ./cmd/muninn/...

      - name: Build macOS amd64 binary
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -tags localassets -ldflags "-X main.version=${GITHUB_REF_NAME}" -o dist/muninn-darwin-amd64 ./cmd/muninn/...

      - name: Build macOS arm64 binary
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -tags localassets -ldflags "-X main.version=${GITHUB_REF_NAME}" -o dist/muninn-darwin-arm64 ./cmd/muninn/...

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{github.run_number}}
          name: Release v${{github.run_number}}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{github.run_number}}
          files: dist/muninn-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS amd64 binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{github.run_number}}
          files: dist/muninn-darwin-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS arm64 binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{github.run_number}}
          files: dist/muninn-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
