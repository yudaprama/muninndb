name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Opt into Node.js 24 for all actions now, ahead of the forced migration
# on June 2, 2026. Silences deprecation warnings for actions/checkout,
# actions/setup-node, actions/cache, etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go: build + test ────────────────────────────────────────────────────
  go:
    name: Go build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Formatting gate — fast, no build needed. Fails if any tracked Go file
      # is not gofmt-clean.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            echo "Run: gofmt -w \$(git ls-files '*.go')"
            exit 1
          fi

      # Cache the binary assets (ORT library + ONNX model).
      # These are ~130MB total and don't change between commits unless the
      # ORT version or model changes. The cache key includes both versions.
      - name: Cache embed assets
        id: asset-cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-linux

      # Only fetch if the cache missed — saves ~2 min and 130MB on cache hits.
      - name: Fetch embed assets (linux/amd64 only)
        if: steps.asset-cache.outputs.cache-hit != 'true'
        run: make fetch-model _ort-linux-amd64

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web assets
        run: cd web && npm ci --ignore-scripts && npm run build

      - name: Build server
        run: go build -tags localassets -o muninndb-server ./cmd/muninn/...

      - name: go vet
        run: go vet -tags localassets ./...

      - name: Run Go tests
        run: go test -tags localassets ./... -timeout 300s -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ── CLI: integration tests (full binary lifecycle + MCP round-trip) ─────
  cli-integration:
    name: CLI integration tests
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore embed assets from cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-linux

      # Fetch if cache missed (e.g. first run after cache key changes)
      - name: Fetch embed assets if needed
        run: |
          if [ ! -f internal/plugin/embed/assets/model_int8.onnx ]; then
            make fetch-model _ort-linux-amd64
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web assets
        run: cd web && npm ci --ignore-scripts && npm run build

      # TestMain builds the binary itself; we just need Go + assets present.
      # Tests exercise: help, unknown-command, init, start, stop, restart, status, MCP round-trip.
      - name: Run CLI integration tests
        run: go test -tags localassets,integration -v -timeout 120s ./cmd/muninn/...

  # ── Windows: build + smoke test ───────────────────────────────────────
  windows:
    name: Windows build & smoke test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache embed assets (Windows)
        id: asset-cache-win
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-windows

      - name: Fetch model assets
        if: steps.asset-cache-win.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Path internal/plugin/embed/assets -Force | Out-Null
          Write-Host "Downloading model..."
          Invoke-WebRequest -Uri "https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/onnx/model_int8.onnx" -OutFile "internal/plugin/embed/assets/model_int8.onnx"
          Write-Host "Downloading tokenizer..."
          Invoke-WebRequest -Uri "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json" -OutFile "internal/plugin/embed/assets/tokenizer.json"
        shell: pwsh

      - name: Fetch ORT DLL
        if: steps.asset-cache-win.outputs.cache-hit != 'true'
        run: |
          Write-Host "Downloading ORT 1.24.2 for windows/amd64..."
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip" -OutFile "$env:TEMP\ort-win-x64.zip"
          Expand-Archive -Path "$env:TEMP\ort-win-x64.zip" -DestinationPath "$env:TEMP\ort-extract" -Force
          $dll = Get-ChildItem -Path "$env:TEMP\ort-extract" -Recurse -Filter "onnxruntime.dll" | Select-Object -First 1
          Copy-Item $dll.FullName -Destination "internal/plugin/embed/assets/onnxruntime_windows_amd64.dll"
          Write-Host "DLL size: $((Get-Item 'internal/plugin/embed/assets/onnxruntime_windows_amd64.dll').Length / 1MB) MB"
        shell: pwsh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web assets
        run: cd web && npm ci --ignore-scripts && npm run build

      - name: Build server
        run: go build -tags localassets -o muninn.exe ./cmd/muninn/...

      - name: Run unit tests
        run: go test -tags localassets ./cmd/muninn/... -timeout 120s -count=1

      - name: Smoke test — version and help
        run: |
          .\muninn.exe version
          .\muninn.exe help
        shell: pwsh

      - name: Smoke test — start, health check, stop
        run: |
          $dataDir = "$env:TEMP\muninn-ci-data"

          # Start daemon
          $proc = Start-Process -FilePath ".\muninn.exe" -ArgumentList "--daemon","--data",$dataDir -NoNewWindow -PassThru
          $srvPid = $proc.Id
          Write-Host "Started muninn (PID: $srvPid)"

          # Wait for health
          $ready = $false
          for ($i = 1; $i -le 20; $i++) {
            Start-Sleep -Seconds 1
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:8750/mcp/health" -UseBasicParsing -ErrorAction Stop
              if ($resp.StatusCode -eq 200) {
                Write-Host "MuninnDB ready after ${i}s"
                $ready = $true
                break
              }
            } catch { }
          }

          if (-not $ready) {
            Write-Host "Health check failed — dumping logs"
            if (Test-Path "$dataDir\..\muninn.log") { Get-Content "$dataDir\..\muninn.log" -Tail 30 }
            exit 1
          }

          # Verify MCP endpoint responds
          $health = Invoke-RestMethod -Uri "http://localhost:8750/mcp/health"
          Write-Host "Health response: $($health | ConvertTo-Json -Compress)"

          # Stop
          Stop-Process -Id $srvPid -Force -ErrorAction SilentlyContinue
          Write-Host "Stopped muninn"
        shell: pwsh

  # ── Python SDK: integration test against a live server ─────────────────
  python-sdk:
    name: Python SDK integration test
    runs-on: ubuntu-latest
    needs: cli-integration  # run after CLI tests so all integration jobs are sequential

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore embed assets from cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-linux

      # Fetch if cache missed (e.g. first run after cache key changes)
      - name: Fetch embed assets if needed
        run: |
          if [ ! -f internal/plugin/embed/assets/model_int8.onnx ]; then
            make fetch-model _ort-linux-amd64
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web assets
        run: cd web && npm ci --ignore-scripts && npm run build

      - name: Build server
        run: go build -tags localassets -o muninndb-server ./cmd/muninn/...

      - name: Start MuninnDB server
        run: |
          ./muninndb-server --daemon --data /tmp/muninn-ci-data &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

          # Wait up to 15s for both listeners: MCP (8750) and REST API (8476).
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8750/mcp/health > /dev/null 2>&1 && \
               curl -sf http://localhost:8476/api/health > /dev/null 2>&1; then
              echo "MuninnDB ready after ${i}s"
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:8750/mcp/health
          curl -sf http://localhost:8476/api/health

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdk/python/requirements.txt

      - name: Install Python dependencies
        run: pip install -r sdk/python/requirements.txt

      - name: Install dev dependencies (pytest)
        run: pip install pytest pytest-asyncio pytest-timeout

      - name: Run SDK smoke test (write + activate)
        working-directory: sdk/python
        run: PYTHONPATH=. python examples/write_activate.py

      - name: Run LangChain integration demo
        working-directory: sdk/python
        run: PYTHONPATH=. python examples/langchain_demo.py

      - name: Run SDK assertion tests
        working-directory: sdk/python
        env:
          MUNINNDB_URL: http://localhost:8476
          MUNINNDB_TOKEN: ""
        run: PYTHONPATH=. pytest tests/test_sdk_smoke.py -v --timeout=30

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

  # ── Playwright E2E: browser-level UI regression tests ────────────────
  playwright-e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore embed assets from cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-linux

      - name: Fetch embed assets if needed
        run: |
          if [ ! -f internal/plugin/embed/assets/model_int8.onnx ]; then
            make fetch-model _ort-linux-amd64
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install chromium --with-deps

      - name: Build web assets
        run: cd web && npm run build

      - name: Run Playwright E2E tests
        run: cd web && npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ── Shell script linting ─────────────────────────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck install.sh scripts/check-build-tags.sh

      - name: Check build tags
        run: bash scripts/check-build-tags.sh

  # ── API spec validation — catches drift before it ships ───────────────
  api-spec-validation:
    name: API spec validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check openapi.yaml exists
        run: |
          if [ ! -f internal/transport/rest/openapi.yaml ]; then
            echo "ERROR: internal/transport/rest/openapi.yaml not found"
            echo "The OpenAPI spec must be present. Add or restore the file."
            exit 1
          fi
          echo "openapi.yaml found ($(wc -c < internal/transport/rest/openapi.yaml) bytes)"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@1.25.14 lint internal/transport/rest/openapi.yaml

      - name: Check route count parity (informational)
        run: |
          # Count paths defined in the OpenAPI spec (lines starting with "  /")
          spec_routes=$(grep -c "^  /" internal/transport/rest/openapi.yaml || true)

          # Count mux.HandleFunc / router.Handle / r.Handle / r.HandleFunc registrations in server.go
          server_routes=$(grep -cE "\.(HandleFunc|Handle)\(" internal/transport/rest/server.go || true)

          echo "OpenAPI spec paths : $spec_routes"
          echo "server.go handlers : $server_routes"

          # Warn (not fail) if they diverge by more than 5.
          # The expected delta is ~5: server.go registers multiple HTTP methods
          # on the same path (e.g. GET + PUT on /api/admin/plugin-config),
          # so HandleFunc count > unique path count. All unique paths are
          # represented in the spec; the surplus HandleFuncs are extra methods
          # on already-documented paths.
          diff=$((server_routes - spec_routes))
          abs_diff=${diff#-}
          if [ "$abs_diff" -gt 5 ]; then
            echo "WARNING: route count diverges by $abs_diff (spec=$spec_routes, server=$server_routes)."
            echo "Consider updating openapi.yaml if new public routes were added."
          else
            echo "Route count parity OK (delta=$diff, within threshold of 5)."
          fi

  vuln-check:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
