      responses:
        "200":
          description: "Updated plasticity config."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlasticityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── Admin — vault lifecycle ───────────────────────────────────────────────

  /api/admin/vaults/{name}:
    delete:
      tags: [admin-vaults]
      summary: "Permanently delete a vault and all its engrams."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: X-Allow-Default
          in: header
          schema:
            type: string
            enum: ["true"]
          description: "Required when deleting the 'default' vault."
      responses:
        "204":
          description: "Vault deleted."
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vaults/{name}/clear:
    post:
      tags: [admin-vaults]
      summary: "Remove all engrams from a vault without deleting the vault itself."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: X-Allow-Default
          in: header
          schema:
            type: string
            enum: ["true"]
          description: "Required when clearing the 'default' vault."
      responses:
        "204":
          description: "Vault cleared."
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vaults/{name}/clone:
    post:
      tags: [admin-vaults]
      summary: "Start an async clone of a vault into a new vault."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloneVaultRequest"
      responses:
        "202":
          description: "Clone job started."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vaults/{name}/merge-into:
    post:
      tags: [admin-vaults]
      summary: "Start an async merge of this vault into a target vault."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            description: "Source vault name."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeVaultRequest"
      responses:
        "202":
          description: "Merge job started."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vaults/{name}/rename:
    post:
      tags: [admin-vaults]
      summary: "Atomically rename a vault (metadata-only)."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameVaultRequest"
      responses:
        "200":
          description: "Vault renamed."
          content:
            application/json:
              schema:
                type: object
                properties:
                  old_name:
                    type: string
                  new_name:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vaults/{name}/job-status:
    get:
      tags: [admin-vaults]
      summary: "Poll the status of a vault clone/merge/import job."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: job_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Job status snapshot."
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
                  status:
                    type: string
                  source:
                    type: string
                  target:
                    type: string
                  started_at:
                    type: string
                    format: date-time
                  completed_at:
                    type: string
                    format: date-time
                    nullable: true
                  error:
                    type: string
                    nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/vaults/{name}/export:
    get:
      tags: [admin-vaults]
      summary: "Export a vault as a .muninn archive (gzip'd tar)."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: reset_metadata
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: "Binary .muninn archive."
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vaults/import:
    post:
      tags: [admin-vaults]
      summary: "Import a .muninn archive into a new vault (async)."
      security:
        - AdminSession: []
      parameters:
        - name: vault
          in: query
          required: true
          schema:
            type: string
          description: "Target vault name."
        - name: reset_metadata
          in: query
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/gzip:
            schema:
              type: string
              format: binary
      responses:
        "202":
          description: "Import job started."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vaults/{name}/reindex-fts:
    post:
      tags: [admin-vaults]
      summary: "Rebuild the full-text-search index for a vault."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Reindex complete."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReindexFTSResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vaults/{name}/reembed:
    post:
      tags: [admin-vaults]
      summary: "Clear stale embeddings and re-embed all engrams with the current model (async)."
      security:
        - AdminSession: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReembedVaultRequest"
      responses:
        "202":
          description: "Reembed job started."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── Admin — system ────────────────────────────────────────────────────────

  /api/admin/embed/status:
    get:
      tags: [admin-system]
      summary: "Return the current embedder configuration and indexing progress."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "Embed status."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbedStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/mcp-info:
    get:
      tags: [admin-system]
      summary: "Return the MCP endpoint URL and token status."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "MCP info."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPInfoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/plugins:
    get:
      tags: [admin-system]
      summary: "List registered plugins with runtime health status."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "Plugin list."
          content:
            application/json:
              schema:
                type: array
