            type: string
      responses:
        "200":
          description: "Plasticity config."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlasticityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [admin-vaults]
