                  $ref: "#/components/schemas/PluginStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/plugin-config:
    get:
      tags: [admin-system]
      summary: "Return saved plugin configuration from disk."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "Plugin config."
