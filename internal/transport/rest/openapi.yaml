      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultConfig"
      responses:
        "200":
          description: "Vault config saved."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/vault/{name}/plasticity:
    get:
      tags: [admin-vaults]
      summary: "Get the plasticity config (raw + resolved) for a vault."
      security:
        - AdminSession: []
      parameters:
