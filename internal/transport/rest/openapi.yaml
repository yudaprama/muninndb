            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [admin-system]
      summary: "Save plugin configuration to disk (requires server restart to apply)."
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: "Config saved."
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/backup:
    post:
      tags: [admin-system]
      summary: "Create a point-in-time Pebble checkpoint backup."
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupRequest"
      responses:
        "200":
          description: "Backup complete."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "Output directory already exists."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/observability:
    get:
      tags: [admin-system]
      summary: "Return full system observability snapshot."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "Observability snapshot."
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── Admin — cluster ───────────────────────────────────────────────────────

  /api/admin/cluster/token:
    get:
      tags: [cluster]
      summary: "Generate a one-time cluster join token."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "Join token."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: "Cluster not enabled."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/cluster/token/regenerate:
    post:
      tags: [cluster]
      summary: "Regenerate the cluster join token."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "New join token."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/cluster/enable:
    post:
      tags: [cluster]
      summary: "Enable cluster mode on this node."
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnableClusterRequest"
      responses:
        "200":
          description: "Cluster enabled."
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  role:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/cluster/disable:
    post:
      tags: [cluster]
      summary: "Disable cluster mode on this node."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "Cluster disabled."
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/cluster/nodes:
    post:
      tags: [cluster]
      summary: "Register a new peer node in the cluster."
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddNodeRequest"
      responses:
        "202":
          description: "Peer registered."
          content:
            application/json:
              schema:
                type: object
                properties:
                  addr:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: "Cluster not enabled."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/cluster/nodes/test:
    post:
      tags: [cluster]
      summary: "Test reachability of a cluster node address."
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestNodeRequest"
      responses:
        "200":
          description: "Reachability result."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNodeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/cluster/nodes/{id}:
    delete:
      tags: [cluster]
      summary: "Remove a node from the cluster."
      security:
        - AdminSession: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: drain
          in: query
          schema:
            type: boolean
            default: false
          description: "Wait for replication lag to reach 0 before removing (up to 30s)."
      responses:
        "200":
          description: "Node removed."
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: "Cluster not enabled."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/cluster/failover:
    post:
      tags: [cluster]
      summary: "Initiate a graceful failover to a target node (Cortex only)."
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailoverRequest"
      responses:
        "200":
          description: "Failover initiated."
          content:
            application/json:
              schema:
                type: object
                properties:
                  initiated:
                    type: boolean
                  target:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "This node is not the current Cortex."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/cluster/tls/rotate:
    post:
      tags: [cluster]
      summary: "Rotate the cluster TLS certificate."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "TLS rotated."
          content:
            application/json:
              schema:
                type: object
                properties:
                  rotated:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: "Cluster or TLS not enabled."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/cluster/settings:
    put:
      tags: [cluster]
      summary: "Update cluster tuning settings (heartbeat, SDOWN threshold, etc.)."
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterSettingsRequest"
      responses:
        "200":
          description: "Settings saved."
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/cluster/events:
    get:
      tags: [cluster]
      summary: "Stream replication log events as Server-Sent Events."
      security:
        - AdminSession: []
      responses:
        "200":
          description: "SSE event stream."
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── Cluster (public v1) ───────────────────────────────────────────────────

  /v1/cluster/info:
    get:
      tags: [cluster]
      summary: "Return cluster topology and current node status."
      security:
        - ClusterToken: []
      responses:
        "200":
          description: "Cluster info."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterInfoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/cluster/health:
    get:
      tags: [cluster]
      summary: "Load-balancer health probe — returns cluster health."
      security:
        - ClusterToken: []
      responses:
        "200":
          description: "Cluster healthy."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterHealthResponse"
        "503":
          description: "Cluster down."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterHealthResponse"

  /v1/cluster/nodes:
    get:
      tags: [cluster]
      summary: "Return member list for cluster discovery."
      security:
        - ClusterToken: []
      responses:
        "200":
          description: "Member list."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterNodesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/cluster/cognitive/consistency:
    get:
      tags: [cluster]
      summary: "Return the last computed Cognitive Consistency Score (CCS)."
      security:
        - ClusterToken: []
      responses:
        "200":
          description: "CCS measurement."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CognitiveConsistencyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Replication ───────────────────────────────────────────────────────────

  /v1/replication/status:
    get:
      tags: [cluster]
      summary: "Return replication status for this node."
      security:
        - ClusterToken: []
      responses:
        "200":
          description: "Replication status."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicationStatusResponse"

  /v1/replication/lag:
    get:
      tags: [cluster]
      summary: "Return the current replication lag for this node."
      security:
        - ClusterToken: []
      responses:
        "200":
          description: "Replication lag."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicationLagResponse"
        "503":
          description: "Cluster disabled."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/replication/promote:
    post:
      tags: [cluster]
      summary: "Trigger a new leader election (promote this node)."
      security:
        - ClusterToken: []
      responses:
        "200":
          description: "Election triggered."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicationPromoteResponse"
        "503":
