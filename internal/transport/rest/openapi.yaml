        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [admin-keys]
      summary: "List all API keys for a vault."
      security:
        - AdminSession: []
      parameters:
        - name: vault
          in: query
          schema:
            type: string
            default: "default"
      responses:
        "200":
          description: "API key list."
          content:
            application/json:
